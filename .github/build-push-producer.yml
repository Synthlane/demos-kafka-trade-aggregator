name: Kafka Producer [Build and Push]

on:
  push:
    paths:
      - 'src/producers/**'
      - 'pyproject.toml'

run-name: "Build producer @ ${{ github.sha }}"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Harbor Registry
        uses: docker/login-action@v3
        with:
          registry: central-harbor.ext.synthlane.com
          username: ${{ secrets.INFISICAL_HARBOR_USERNAME }}
          password: ${{ secrets.INFISICAL_HARBOR_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/producers/Dockerfile
          push: true
          tags: |
            central-harbor.ext.synthlane.com/internal/demos-kafka-trade-aggregator/kafka-trade-producer:${{ github.sha }}
            central-harbor.ext.synthlane.com/internal/demos-kafka-trade-aggregator/kafka-trade-producer:latest
